name: CI

on:
    pull_request:
        branches:
            - staging

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout your repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                node-version: 20 # Specify the Node.js version

            - name: Install dependencies
              run: npm install
            
            - name: Run Lint
              run: npm run lint

            - name: Run tests
              run: npm run test
            
            - name: Run build
              run: npm run build